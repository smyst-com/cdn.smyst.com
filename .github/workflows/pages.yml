name: Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          repository: smyst-com/smyst-app
          ref: main
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_CANONICAL_HOST: https://smyst.com
          VITE_API_BASE_URL: https://cherry-asparagus-a32jleuk8dgn22zu.salad.cloud
          VITE_API_FALLBACK_BASE_URL: https://api.smyst.com
          VITE_AUTH_BASE_URL: https://cherry-asparagus-a32jleuk8dgn22zu.salad.cloud/auth
          VITE_AUTH_FALLBACK_BASE_URL: https://api.smyst.com/auth
      - run: echo "cdn.smyst.com" > dist/CNAME
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
